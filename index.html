<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Libre+Franklin:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <span class="site-header__logo" aria-hidden="true"></span>
      <h1 class="site-header__title">Connections</h1>
      <span class="site-header__date" id="puzzle-date"></span>
    </div>
  </header>

  <main class="game">
    <p class="game__prompt">Create four groups of four!</p>

    <section class="board" id="board" aria-label="Puzzle board"></section>

    <div class="mistakes" id="mistakes-bar">
      <span class="mistakes__label">Mistakes Remaining:</span>
      <span class="mistakes__dots" id="mistake-dots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>
    </div>

    <div class="controls" id="controls">
      <button class="btn" id="shuffle-btn" type="button">Shuffle</button>
      <button class="btn" id="deselect-btn" type="button" disabled>Deselect All</button>
      <button class="btn btn--submit" id="submit-btn" type="button" disabled>Submit</button>
    </div>

    <div class="endgame" id="endgame" hidden>
      <p class="endgame__message" id="endgame-message"></p>
      <pre class="endgame__results" id="endgame-results"></pre>
      <button class="btn btn--submit" id="play-again-btn" type="button">Play Again</button>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="game.js"></script>
</body>
</html>
